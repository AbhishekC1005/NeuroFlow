name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/**'

jobs:
  # ============ JOB 1: Validate code before deploying ============
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt --quiet

      - name: Check Python syntax (all files)
        run: |
          cd backend
          python -m py_compile app.py
          python -m py_compile ml_service.py
          python -m py_compile auth.py
          python -m py_compile database.py
          python -m py_compile models.py
          python -m py_compile chat_service.py
          echo "✅ All Python files have valid syntax"

      - name: Check imports work
        env:
          MONGODB_URI: "mongodb://dummy:27017/test"
          JWT_SECRET_KEY: "ci-test-secret"
          CLOUDINARY_CLOUD_NAME: "dummy"
          CLOUDINARY_API_KEY: "dummy"
          CLOUDINARY_API_SECRET: "dummy"
          OPENAI_API_KEY: "dummy"
        run: |
          cd backend
          python -c "
          import app
          import ml_service
          import auth
          import database
          import models
          import chat_service
          print('✅ All modules import successfully')
          "

  # ============ JOB 2: Deploy only if validation passes ============
  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/NeuroFlow
            git pull origin main
            cd backend
            source venv/bin/activate
            pip install -r requirements.txt --quiet
            sudo systemctl restart flowml
            echo "✅ Deployment complete!"

      - name: Health check
        run: |
          echo "Waiting 10s for server to start..."
          sleep 10
          curl --fail --max-time 15 http://${{ secrets.EC2_HOST }}:8000/ || echo "⚠️ Health check failed - server may not have started correctly"
